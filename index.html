<!DOCTYPE html>
<html>
<head>
  <title>Caroline is upset, send help!</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background: radial-gradient(circle at top, #ffe6f5, #ffd6eb, #fff0f8);
      padding: 20px;
      overflow-x: hidden;
      color: black;
    }

    /* ✨ FLOATING GLITTER */
    .glitter {
      position: fixed;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.9;
      box-shadow: 0 0 10px white, 0 0 20px pink;
      animation: floatUp linear infinite;
      z-index: 0;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh); opacity: 0; }
      20% { opacity: 1; }
      to { transform: translateY(-10vh); opacity: 0; }
    }

    /* 💎 CURSOR DIAMOND SPARKLES */
    .cursor-sparkle {
      position: fixed;
      width: 10px;
      height: 10px;
      background: white;
      transform: rotate(45deg);
      pointer-events: none;
      z-index: 999;
      box-shadow: 0 0 12px white, 0 0 25px pink;
      animation: sparkleFade 0.7s ease-out forwards;
    }

    @keyframes sparkleFade {
      from { transform: rotate(45deg) scale(1); opacity: 1; }
      to { transform: rotate(45deg) scale(0.2); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 35px;
      max-width: 650px;
      margin: auto;
      box-shadow: 0 20px 60px rgba(255, 182, 193, 0.4);
      border: 1px solid rgba(255,255,255,0.6);
      animation: floaty 6s ease-in-out infinite;
    }

    @keyframes floaty {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .title {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      margin-bottom: 20px;
      color: black;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 25px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff8fc4, #ffc1e3, #ff8fc4);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
      transition: width 0.4s ease;
    }

    @keyframes shimmer {
      0% { background-position: 0% }
      100% { background-position: 200% }
    }

    .question {
      font-size: 22px;
      margin: 20px 0;
      font-weight: 500;
      color: black;
      animation: fadeIn 0.5s ease forwards;
    }

    .answers {
      display: grid;
      gap: 14px;
      position: relative;
      z-index: 2;
    }

    .answer {
      border-radius: 30px;
      padding: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #ffe4ec, #ffd6e7);
      border: 2px solid #ffc1d6;
      transition: all 0.25s ease;
      text-align: left;
      position: relative;
      z-index: 2;
      color: black;
    }

    .answer:hover {
      transform: scale(1.04);
      box-shadow: 0 10px 25px rgba(255, 105, 180, 0.35);
    }

    .back-btn {
      margin-top: 25px;
      padding: 12px 20px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, #ffc1e3, #ff8fc4);
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      color: black;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="title">Caroline is upset, send help!</div>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div id="app"></div>
</div>

<script>
let historyStack = [];

/* ✨ BACKGROUND GLITTER */
for (let i = 0; i < 80; i++) {
  const g = document.createElement("div");
  g.className = "glitter";
  g.style.left = Math.random() * 100 + "vw";
  g.style.animationDuration = (5 + Math.random() * 10) + "s";
  document.body.appendChild(g);
}

/* 💎 DIAMOND CURSOR TRAIL */
document.addEventListener("mousemove", (e) => {
  const s = document.createElement("div");
  s.className = "cursor-sparkle";
  s.style.left = e.clientX + "px";
  s.style.top = e.clientY + "px";
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 700);
});

const quiz = {
  start: {
    question: "Is Caroline upset?",
    answers: [
      { text: "No!", next: "resultA" },
      { text: "Obviously, that's why I'm here.", next: "q2a" }
    ]
  },

  q2a: {
    question: "Is she crying?",
    answers: [
      { text: "No.", next: "q3a" },
      { text: "Yes.", next: "q3b" }
    ]
  },

  q3a: {
    question: "That’s good! Do you know why she’s upset? Pick one you feel is closest, or “Other” for more options that are unrelated to you!",
    answers: [
      { text: "Having trouble trusting you because you didn’t respond or pick up her call.", next: "resultB" },
      { text: "Insecure about another girl or questioning if you’re hiding her.", next: "resultC" },
      { text: "General trust issues.", next: "resultD" },
      { text: "Feels like you criticized her for something that she took too personally.", next: "resultE" },
      { text: "Worried about the future.", next: "resultF" },
      { text: "General lack of communication or misunderstanding.", next: "resultG" },
      { text: "Feels like she’s putting in more effort.", next: "resultH" },
      { text: "Sad you didn’t compliment her outfit.", next: "resultI" },
      { text: "Feels like everything is her fault or that bringing up problems are inconvenient.", next: "resultJ" },
      { text: "Misses you, long distance is hard!", next: "resultK" },
      { text: "Other.", next: "q4a" }
    ]
  },

  q3b: {
    question: "Don’t panic! Girls cry a lot for no reason and this is normal! Speak to her gently to avoid further tears and then ask what’s wrong.",
    answers: [
      { text: "CLICK HERE when you’ve comforted her a bit and asked!", next: "q4b" }
    ]
  },

  q4a: {
    question: "More options (because it’s not always your fault)!",
    answers: [
      { text: "Hungry or tired.", next: "resultL" },
      { text: "Doesn’t feel pretty or feels bloated.", next: "resultM" },
      { text: "Stressed about work.", next: "resultN" },
      { text: "Stressed about money.", next: "resultO" },
      { text: "Can’t figure out what to wear.", next: "resultP" },
      { text: "It’s a bit chilly.", next: "resultQ" }
    ]
  },

  q4b: {
    question: "Great! Now, do you know why she’s upset? Pick one you feel is closest, or “Other” for more options that are unrelated to you!",
    answers: [
      { text: "Having trouble trusting you because you didn’t respond or pick up her call.", next: "resultB" },
      { text: "Insecure about another girl.", next: "resultC" },
      { text: "General trust issues.", next: "resultD" },
      { text: "Feels like you criticized her for something that she took too personally.", next: "resultE" },
      { text: "Worried about the future.", next: "resultF" },
      { text: "General lack of communication or misunderstanding.", next: "resultG" },
      { text: "Feels like she’s putting in more effort.", next: "resultH" },
      { text: "Sad you didn’t compliment her outfit.", next: "resultI" },
      { text: "Feels like everything is her fault or that bringing up problems are inconvenient.", next: "resultJ" },
      { text: "Misses you.", next: "resultK" },
      { text: "Other.", next: "q4a" }
    ]
  },

  resultA: { question: "Congrats! You're doing everything right!", answers: [] },
  resultB: { question: "Remind her that you’re always thinking about her and that you not responding has nothing to do with you caring about her. Explain to her what you were doing (and if applicable, who with) and remind her that you love her and you would never do anything to hurt her.", answers: [] },
  resultC: { question: "You’re dating for a reason! Tell her that if you were interested in other girls you wouldn’t have committed to her. It helps to say you love her and she’s the one you want. Also maybe add in that you’re proud to be dating her as well.", answers: [] },
  resultD: { question: "Remember she has a hard time trusting you because of the past. She just wants to know that you chose her and that you love her and are committed to her and see a real future with her.", answers: [] },
  resultE: { question: "Girls tend to take things personally even if you didn’t mean it. Whatever it was, it would be helpful to remind her that it doesn’t affect your love for her and that you still respect her and want her to grow!", answers: [] },
  resultF: { question: "Worrying about the future is normal when you’ve been hurt in the past - basically she’s scared of getting hurt again. So just remind her that you love her and that no problem is too hard for us to tackle as a team as long as we work together.", answers: [] },
  resultG: { question: "Ask a lot of questions about how she’s feeling and open up about how you’re feeling! Honesty is best here, she just wants to connect.", answers: [] },
  resultH: { question: "Remind her there are times in every relationship where one person puts in more, and maybe offer something specific you can do to make her not feel that way depending on the circumstance.", answers: [] },
  resultI: { question: "Compliment her outfit! And helps to say something specific about what you like about it so she doesn’t think you made it up!", answers: [] },
  resultJ: { question: "It’s hard for her to be honest because she doesn’t want to inconvenience you or be needy. Remind her that’s the only way the relationship will be successful and that you never think she’s crazy.", answers: [] },
  resultK: { question: "Tell her you miss her too and make sure you have something planned for the near future together!", answers: [] },
  resultL: { question: "Typically she likes sweet things, so maybe offer to eat one of those with her! If she’s tired, offer to cuddle!", answers: [] },
  resultM: { question: "Super common even if she looks great to you. Tell her you can’t tell she’s bloated and she always looks beautiful to you. And then maybe compliment something specific so she believes you!", answers: [] },
  resultN: { question: "In these cases, it’s likely better to just be an ear to listen instead of trying to solve. She values your input though and wants you to help her grow as a person, so gentle advice may also be welcome.", answers: [] },
  resultO: { question: "She knows this already, but money isn’t everything. As long as she keeps working hard and doing what she loves, money will come. If you’re in a position or feel comfortable offering to pay for something, that’s nice as well, but not always necessary.", answers: [] },
  resultP: { question: "Sit there and watch her try on clothes without rushing her! Usually this just takes time and she wants you to love the outfit too.", answers: [] },
  resultQ: { question: "Don’t tell her she’s not cold! Offer a jacket! Or give her a hug.", answers: [] }
};

function render(key) {
  const node = quiz[key];
  const isResult = node.answers.length === 0;

  if (!isResult) historyStack.push(key);

  let progressPercent = isResult ? 100 : Math.min(((historyStack.length + 1) / 6) * 100, 95);
  document.getElementById("progress").style.width = progressPercent + "%";

  const app = document.getElementById("app");
  app.innerHTML = `<div class="question">${node.question}</div><div class="answers"></div>`;

  const answersDiv = document.querySelector(".answers");

  node.answers.forEach(a => {
    const div = document.createElement("div");
    div.className = "answer";
    div.innerHTML = `<p>${a.text}</p>`;
    div.onclick = () => render(a.next);
    answersDiv.appendChild(div);
  });

  if (isResult) historyStack.push(key);

  if (historyStack.length > 1) {
    const backBtn = document.createElement("button");
    backBtn.className = "back-btn";
    backBtn.innerText = "← Go Back";
    backBtn.onclick = () => {
      historyStack.pop();
      const prev = historyStack.pop();
      render(prev);
    };
    app.appendChild(backBtn);
  }
}

render("start");
</script>

</body>
</html>
